<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Menzi Muck AG – Platzhalter Logo -->
  <!-- Ersetzen durch echte Datei: logos/menzimuck.svg -->
  <rect width="200" height="60" rx="4" fill="#1A1A1A"/>
  <!-- Stilisiertes "M" als Icon – Baggerarm-Silhouette -->
  <path d="M12 44 L12 20 L21 32 L30 20 L30 44" stroke="#FFD100" stroke-width="4.5" stroke-linejoin="round" fill="none" stroke-linecap="round"/>
  <!-- Textbereich -->
  <text x="44" y="27" font-family="'Orbitron',Arial,sans-serif" font-size="11" font-weight="700" fill="#FFD100" letter-spacing="1">MENZI MUCK</text>
  <text x="44" y="43" font-family="Arial,sans-serif" font-size="7.5" font-weight="400" fill="#888888" letter-spacing="0.5">AG · SEIT 1963</text>
  <!-- Gelbe Akzentlinie -->
  <line x1="44" y1="30" x2="185" y2="30" stroke="#FFD100" stroke-width="0.8" stroke-opacity="0.35"/>
</svg>
